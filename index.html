<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My YouTube Stats</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            text-align: center;
            padding: 50px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            max-width: 500px;
            margin: auto;
        }
        input {
            padding: 10px;
            width: 70%;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            padding: 10px 20px;
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #cc0000;
        }
        .stats {
            text-align: left;
            margin-top: 20px;
            line-height: 1.8;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>YouTube Channel Stats Viewer</h2>
        <p>Enter a YouTube Handle (e.g., @mkbhd)</p>
        <input type="text" id="handleInput" placeholder="@username">
        <button onclick="getStats()">Get Stats</button>

        <div class="stats" id="results">
            </div>
    </div>

    <script>
        
        const API_KEY = 'AIzaSyADHO4cktdabNXKXXgMa8a9kBtxWm_pTZo'; 

        async function getStats() {
            const handle = document.getElementById('handleInput').value.replace('@', '').trim();
            const resultsDiv = document.getElementById('results');
            
            if (!handle) {
                resultsDiv.innerHTML = "<p style='color:red;'>Please enter a handle!</p>";
                return;
            }

            resultsDiv.innerHTML = "<p>Loading...</p>";

            try {
                
                const response = await fetch(`https://youtube.googleapis.com/youtube/v3/channels?part=snippet,statistics&forHandle=${handle}&key=${API_KEY}`);
                const data = await response.json();

                if (data.items && data.items.length > 0) {
                    const channel = data.items[0];
                    const stats = channel.statistics;
                    const snippet = channel.snippet;
                    
                    
                    const creationDate = new Date(snippet.publishedAt).toLocaleDateString();

                    resultsDiv.innerHTML = `
                        <h3>${snippet.title}</h3>
                        <p><strong>Channel Created:</strong> ${creationDate}</p>
                        <p><strong>Total Views:</strong> ${Number(stats.viewCount).toLocaleString()}</p>
                        <p><strong>Subscribers:</strong> ${Number(stats.subscriberCount).toLocaleString()}</p>
                        <p><strong>Total Videos Uploaded:</strong> ${Number(stats.videoCount).toLocaleString()}</p>
                    `;
                } else {
                    resultsDiv.innerHTML = "<p style='color:red;'>Channel not found. Make sure the handle is correct!</p>";
                }
            } catch (error) {
                resultsDiv.innerHTML = "<p style='color:red;'>Error fetching data. Check your console for details.</p>";
                console.error(error);
            }
        }
    </script>

</body>
</html>
